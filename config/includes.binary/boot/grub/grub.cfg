set default=0
set timeout=10

menuentry "Speedy Linux (Live)" {
    linux /live/vmlinuz-6.12.74+deb13+1-arm64 boot=live components
    initrd /live/initrd.img-6.12.74+deb13+1-arm64
}

menuentry "Speedy Linux (Fail-safe)" {
    linux /live/vmlinuz-6.12.74+deb13+1-arm64 boot=live components memtest noapic noapm nodma nomce nolapic nosmp nosplash vga=normal
    initrd /live/initrd.img-6.12.74+deb13+1-arm64
}
